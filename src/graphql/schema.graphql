type Query {
  searchFlights(
    origin: String!
    destination: String!
    departureDate: String!
    passengers: Int!
    returnDate: String
    seatClass: SeatClass
  ): FlightSearchResult!
}

type FlightSearchResult {
  outbound: [FlightOption!]!
  inbound: [FlightOption!]
}

type FlightOption {
  id: ID!
  flightNumber: String!
  origin: String!
  destination: String!
  departureAt: String!
  arrivalAt: String!
  durationMinutes: Int!
  stops: Int!
  availableSeats: Int!
  farePerPassenger: FareBreakdown!
}

type FareBreakdown {
  baseFarePence: Int!
  taxesPence: Int!
  totalPence: Int!
  currency: String!
}

enum SeatClass {
  ECONOMY
  BUSINESS
}
